# Name of the branch you want to create
branch_name = "iroh-X"

# List of directories that need to be patched.
# These should be absolute paths.
directories = [
    "/FULL/PATH/Work/irpc",
    "/FULL/PATH/Work/iroh-c-ffi",
    "/FULL/PATH/Work/dumbpipe",
    "/FULL/PATH/Work/iroh-ping",
    "/FULL/PATH/Work/iroh-gossip",
    "/FULL/PATH/Work/iroh-blobs",
    "/FULL/PATH/Work/sendme",
    "/FULL/PATH/Work/iroh-doctor",
    "/FULL/PATH/Work/iroh-docs",
    "/FULL/PATH/Work/iroh-n0des",
]

# List of crates to patch and their GitHub repository URLs.
[[crates]]
name = "iroh"
repo_url = "https://github.com/n0-computer/iroh.git"

